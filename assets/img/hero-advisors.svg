<svg width="720" height="560" viewBox="0 0 720 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Beraterlisten mit Kategorien">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F2F7F5"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8F8F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#2C5545" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- soft background -->
  <rect x="30" y="40" width="660" height="480" rx="36" fill="url(#bg)" stroke="#E4E1DC"/>

  <!-- header -->
  <rect x="70" y="80" width="580" height="56" rx="16" fill="#FFFFFF" stroke="#EDEBE7"/>
  <rect x="96" y="98" width="120" height="8" rx="4" fill="#E4E1DC"/>
  <rect x="230" y="98" width="160" height="8" rx="4" fill="#E4E1DC"/>
  <rect x="560" y="96" width="70" height="14" rx="7" fill="#EAF0ED" stroke="#D8E8E1"/>

  <!-- list card 1 -->
  <g filter="url(#shadow)">
    <rect x="70" y="160" width="580" height="92" rx="18" fill="url(#card)" stroke="#EDEBE7"/>
  </g>
  <circle cx="110" cy="206" r="22" fill="#EAF0ED" stroke="#D8E8E1"/>
  <rect x="146" y="190" width="190" height="10" rx="5" fill="#141412" fill-opacity="0.75"/>
  <rect x="146" y="208" width="240" height="8" rx="4" fill="#5C5B57" fill-opacity="0.6"/>
  <rect x="146" y="226" width="160" height="8" rx="4" fill="#5C5B57" fill-opacity="0.45"/>
  <rect x="520" y="188" width="92" height="20" rx="10" fill="#F2F7F5" stroke="#D8E8E1"/>
  <rect x="520" y="214" width="72" height="16" rx="8" fill="#F6EFE6" stroke="#E6D9C8"/>

  <!-- list card 2 -->
  <g filter="url(#shadow)">
    <rect x="70" y="270" width="580" height="92" rx="18" fill="url(#card)" stroke="#EDEBE7"/>
  </g>
  <circle cx="110" cy="316" r="22" fill="#F6EFE6" stroke="#E6D9C8"/>
  <rect x="146" y="300" width="170" height="10" rx="5" fill="#141412" fill-opacity="0.75"/>
  <rect x="146" y="318" width="250" height="8" rx="4" fill="#5C5B57" fill-opacity="0.6"/>
  <rect x="146" y="336" width="150" height="8" rx="4" fill="#5C5B57" fill-opacity="0.45"/>
  <rect x="520" y="298" width="82" height="20" rx="10" fill="#F2F7F5" stroke="#D8E8E1"/>
  <rect x="520" y="324" width="92" height="16" rx="8" fill="#F2F2F0" stroke="#E4E1DC"/>

  <!-- list card 3 -->
  <g filter="url(#shadow)">
    <rect x="70" y="380" width="580" height="92" rx="18" fill="url(#card)" stroke="#EDEBE7"/>
  </g>
  <circle cx="110" cy="426" r="22" fill="#EEF2FA" stroke="#DDE5F2"/>
  <rect x="146" y="410" width="180" height="10" rx="5" fill="#141412" fill-opacity="0.75"/>
  <rect x="146" y="428" width="220" height="8" rx="4" fill="#5C5B57" fill-opacity="0.6"/>
  <rect x="146" y="446" width="140" height="8" rx="4" fill="#5C5B57" fill-opacity="0.45"/>
  <rect x="520" y="408" width="76" height="20" rx="10" fill="#F2F7F5" stroke="#D8E8E1"/>
  <rect x="520" y="434" width="84" height="16" rx="8" fill="#F6EFE6" stroke="#E6D9C8"/>

  <!-- category icons -->
  <g transform="translate(520 70)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#EAF0ED" stroke="#D8E8E1"/>
    <!-- insurance shield -->
    <path d="M22 11L32 15V23C32 28.5 27.5 33.5 22 35C16.5 33.5 12 28.5 12 23V15L22 11Z" stroke="#2C5545" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(574 70)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#F6EFE6" stroke="#E6D9C8"/>
    <!-- real estate home -->
    <path d="M12 24L22 15L32 24V34H12V24Z" stroke="#9E6B30" stroke-width="2" fill="none"/>
    <path d="M18 34V26H26V34" stroke="#9E6B30" stroke-width="2" fill="none"/>
  </g>
  <g transform="translate(628 70)">
    <rect x="0" y="0" width="44" height="44" rx="12" fill="#EEF2FA" stroke="#DDE5F2"/>
    <!-- finance chart -->
    <path d="M12 30L20 22L26 26L34 18" stroke="#2A4D8F" stroke-width="2" fill="none"/>
    <path d="M12 34H34" stroke="#2A4D8F" stroke-width="2" fill="none"/>
  </g>
</svg>
